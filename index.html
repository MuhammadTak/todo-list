<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
</head>
<body>
    <h1 class="heading">Todo-list</h1>
    <div class="container">
        <div class="newtask">
            <input class="newtask-input" type="text" placeholder="Add task to be done..">
            <button class="newtask-add">Add</button>
        </div>
        <div class="tasks">
            <!-- <div class="task">
                <span class="task-name">${newTask-input.value}</span>
                <img src="images/remove.png" alt="remove task">
            </div> -->
        </div>
        <div class="clear-all_container">
            <span class="clear-all">Clear All</span>
        </div>
        <div class="no-tasks_container">
            <span class="no-tasks_text">No tasks here yet</span>
            <img class="no-tasks_image" src="images/icons/no-task.png" alt="empty">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
